<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página con Columnas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h1>Mi Sitio Web</h1>
        <p>Estructura con columnas</p>
    </header>

    <main class="layout">
        
        <aside class="sidebar">
            <h3>Menú</h3>
            <ul>
                <li>Inicio</li>
                <li>Productos</li>
                <li>Servicios</li>
                <li>Contacto</li>
            </ul>
        </aside>

        <section class="content">
            <h2>Contenido principal</h2>
            <p>
                Aquí va el contenido principal de la página.  
                Puede ser texto, tarjetas, productos, posts, etc.
            </p>
        </section>

    </main>

    <footer class="footer">
        <p>© 2026 Mi sitio web</p>
    </footer>

</body>
</html>
