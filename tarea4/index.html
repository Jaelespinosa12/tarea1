<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario de Inscripción</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <form class="card">

        <h1>Formulario de Inscripción</h1>
        <p class="sub">Complete sus datos correctamente</p>

        <div class="grid">

            <div class="input-group full">
                <label>Solicitud de ingreso</label>
                <input type="text" placeholder="Tu texto aquí">
            </div>

            <div class="input-group full">
                <label>Director / Presidente</label>
                <input type="text">
            </div>

            <div class="input-group full">
                <label>Tipo de afiliación</label>

                <div class="radio-group">
                    <label><input type="radio" name="tipo"> Bronce</label>
                    <label><input type="radio" name="tipo"> Plata</label>
                    <label><input type="radio" name="tipo"> Oro</label>
                </div>
            </div>

            <div class="input-group">
                <label>Nombre de pila</label>
                <input type="text">
            </div>

            <div class="input-group">
                <label>Dirección</label>
                <input type="text">
            </div>

            <div class="input-group">
                <label>Fecha nacimiento</label>
                <input type="date">
            </div>

            <div class="input-group">
                <label>Nacionalidad</label>
                <input type="text">
            </div>

            <div class="input-group">
                <label>Sexo</label>
                <select>
                    <option>Seleccionar</option>
                    <option>Masculino</option>
                    <option>Femenino</option>
                </select>
            </div>

            <div class="input-group">
                <label>Ciudad / País</label>
                <input type="text">
            </div>

            <div class="input-group full">
                <label>Correo electrónico</label>
                <input type="email">
            </div>

            <div class="input-group">
                <label>Permiso de conducir</label>
                <input type="text">
            </div>

            <div class="input-group">
                <label>Otro número de tarjeta</label>
                <input type="text">
            </div>

        </div>

        <button type="submit">Enviar formulario</button>

    </form>

</div>

</body>
</html>
