<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Lista | alertaCJBflix</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b0f1a;
color:white;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:#000;
z-index:10;
}

.logo{
font-size:26px;
font-weight:700;
color:#ff003c;
}

.nav-links a{
margin-left:20px;
text-decoration:none;
color:white;
transition:0.3s;
}

.nav-links a:hover{
color:#ff003c;
}

/* CONTENIDO */
.container{
margin-top:120px;
padding:40px;
}

h1{
color:#ff003c;
margin-bottom:20px;
}

.list-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
gap:20px;
}

.list-item{
background:#1c1f2e;
padding:20px;
border-radius:10px;
text-align:center;
}

.list-item h3{
margin-bottom:10px;
}

.list-item button{
padding:8px 15px;
border:none;
background:#ff003c;
color:white;
cursor:pointer;
border-radius:5px;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">alertaCJBflix</div>
<div class="nav-links">
<a href="clon.html">Inicio</a>
<a href="series.html">Series</a>
<a href="peliculas.html">Películas</a>
<a href="lista.html">Mi Lista</a>
</div>
</div>

<div class="container">
<h1> Mi Lista</h1>
<div class="list-grid" id="listContainer">
</div>
</div>

<script>
function loadList(){
let list = JSON.parse(localStorage.getItem("miLista")) || [];
let container = document.getElementById("listContainer");
container.innerHTML = "";

if(list.length === 0){
container.innerHTML = "<p>No tienes contenido guardado.</p>";
}

list.forEach((item,index)=>{
let div = document.createElement("div");
div.classList.add("list-item");
div.innerHTML = `
<h3>${item}</h3>
<button onclick="removeItem(${index})">Eliminar</button>
`;
container.appendChild(div);
});
}

function removeItem(index){
let list = JSON.parse(localStorage.getItem("miLista")) || [];
list.splice(index,1);
localStorage.setItem("miLista", JSON.stringify(list));
loadList();
}

loadList();
</script>

</body>
</html>
