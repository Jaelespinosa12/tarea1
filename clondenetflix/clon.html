<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alertaCJBflix</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b0f1a;
color:white;
overflow-x:hidden;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
z-index:10;
}

.logo{
font-size:28px;
font-weight:700;
color:#ff003c;
}

.nav-links a{
margin-left:20px;
text-decoration:none;
color:white;
font-weight:500;
transition:0.3s;
}

.nav-links a:hover{
color:#ff003c;
}

/* HERO */
.hero{
height:90vh;
background:url('https://images.unsplash.com/photo-1601933470928-c3bba4b0b5c0') center/cover no-repeat;
display:flex;
align-items:center;
padding:60px;
}

.hero-content{
max-width:600px;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero p{
margin-bottom:20px;
}

.hero button{
padding:12px 25px;
border:none;
background:#ff003c;
color:white;
font-weight:600;
cursor:pointer;
border-radius:5px;
transition:0.3s;
}

.hero button:hover{
background:white;
color:black;
}

/* SECTIONS */
.section{
padding:40px;
}

.section h2{
margin-bottom:20px;
color:#ff003c;
}

.movies{
display:flex;
overflow-x:auto;
gap:15px;
}

.movie{
min-width:200px;
height:300px;
background-size:cover;
background-position:center;
border-radius:10px;
transition:0.3s;
cursor:pointer;
}

.movie:hover{
transform:scale(1.08);
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:20;
}

.modal-content{
background:#111;
padding:30px;
border-radius:10px;
width:80%;
max-width:600px;
text-align:center;
}

.modal button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#ff003c;
cursor:pointer;
font-weight:600;
color:white;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">alertaCJBflix</div>
<div class="nav-links">
<a href=clon.htmltarget target="_blank">Inicio</a>
<a href= series.html target = "_blank">Series</a>
<a href=peliculas.html target="_blank">Películas</a>
<a href=lista.html target="_blank">Mi Lista</a>
</div>
</div>

<div class="hero">
<div class="hero-content">
<h1>Bienvenido a alertaCJBflix</h1>
<p>Las mejores películas y series en un solo lugar. Disfruta contenido ilimitado.</p>
<button onclick="playMovie('Contenido Destacado')">Ver Ahora</button>
</div>
</div>

<div class="section">
<h2>Tendencias</h2>
<div class="movies">
<div class="movie" onclick="playMovie('Acción Total')" style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba');"></div>
<div class="movie" onclick="playMovie('Mundo Futuro')" style="background-image:url('https://images.unsplash.com/photo-1505685296765-3a2736de412f');"></div>
<div class="movie" onclick="playMovie('Drama Urbano')" style="background-image:url('https://images.unsplash.com/photo-1497032205916-ac775f0649ae');"></div>
<div class="movie" onclick="playMovie('Comedia Nocturna')" style="background-image:url('https://images.unsplash.com/photo-1517602302552-471fe67acf66');"></div>
</div>
</div>

<div class="section">
<h2>📺 Series Exclusivas</h2>
<div class="movies">
<div class="movie" onclick="playMovie('Serie Misterio')" style="background-image:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');"></div>
<div class="movie" onclick="playMovie('Ciudad Oscura')" style="background-image:url('https://images.unsplash.com/photo-1492724441997-5dc865305da7');"></div>
<div class="movie" onclick="playMovie('Historias Reales')" style="background-image:url('https://images.unsplash.com/photo-1515169067868-5387ec356754');"></div>
</div>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<h2 id="movieTitle"></h2>
<p>Reproduciendo contenido exclusivo en alertaCJBflix...</p>
<button onclick="closeModal()">Cerrar</button>
</div>
</div>

<script>
function playMovie(title){
document.getElementById("movieTitle").innerText = title;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
