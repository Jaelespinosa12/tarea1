<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b0f1a;
color:white;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:#000;
z-index:10;
}

.logo{
font-size:26px;
font-weight:700;
color:#ff003c;
}

.nav-links a{
margin-left:20px;
text-decoration:none;
color:white;
transition:0.3s;
}

.nav-links a:hover{
color:#ff003c;
}

/* HEADER */
.header{
margin-top:100px;
padding:40px;
}

.header h1{
font-size:40px;
margin-bottom:10px;
color:#ff003c;
}

/* GRID */
.movies-grid{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
gap:25px;
}

.movie-card{
position:relative;
overflow:hidden;
border-radius:12px;
cursor:pointer;
transition:0.4s;
}

.movie-card img{
width:100%;
height:320px;
object-fit:cover;
transition:0.4s;
}

.movie-card:hover img{
transform:scale(1.1);
filter:brightness(40%);
}

.movie-overlay{
position:absolute;
bottom:0;
left:0;
width:100%;
padding:20px;
opacity:0;
transition:0.4s;
}

.movie-card:hover .movie-overlay{
opacity:1;
}

.movie-overlay h3{
margin-bottom:5px;
}

.movie-overlay p{
font-size:14px;
margin-bottom:10px;
color:#ccc;
}

.movie-overlay button{
padding:8px 15px;
border:none;
background:#ff003c;
color:white;
cursor:pointer;
border-radius:5px;
font-weight:600;
}
</style>
</head>
